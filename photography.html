<script>
  const image_array = [
    'Colorado.jpg',
    'Flowers.jpg',
    'Gaotie.jpg',
    'Half_Dome.jpg',
    'Huashan.jpg',
    'Maybe_Timmy.jpg',
    'Railroad.jpg',
    'Redwoods_National_Park.jpg',
    'Retirement_Home.jpg',
    'San_Juan.jpg',
    'Shop.jpg',
    'Sightseeing.jpg',
    'Skyline.jpg',
    'Yosemite_Sunset.jpg',
    'Yosemite_Valley.jpg'
  ];

  var clicks = 0;
  function get_next_image(add) {
    clicks += add + image_array.length;
    clicks %= image_array.length;
    const selected_image = image_array[clicks];
    document.getElementById("next_image").src = `photography/${selected_image}`;
  }
</script>

<section class="hero is-large is-flex is-align-items-center">
  <div class="buttons">
    <button class='button' onclick='get_next_image(1)'>&lt;</button>
    <button class='button' onclick='get_next_image(-1)'>></button>
  </div>
</section>

<p class="p-2"></p>

<div class="gallery">
  <section class="hero is-large is-flex is-align-items-center">
    <body onload="get_next_image(0)">
      <img id='next_image' alt='image' />
  </section>
</div>
