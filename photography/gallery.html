  <script>
    const image_array = [
      'Colorado.jpg',
      'Flowers.jpg',
      'Gaotie.jpg',
      'Half_Dome.jpg',
      'Maybe_Timmy.jpg',
      'Railroad.jpg',
      'Redwoods_National_Park.jpg',
      'Retirement_Home.jpg',
      'Sightseeing.jpg',
      'Skyline.jpg',
      'Yosemite_Sunset.jpg',
      'Yosemite_Valley.jpg',
      'Bikes.jpg'
    ];

    var clicks = 0;
    function get_next_image(add) {
      clicks += add + image_array.length;
      clicks %= image_array.length;
      const selected_image = image_array[clicks];
      document.getElementById("next_image").src = `./images/${selected_image}`;
    }
  </script>

  <body>
    <div id='container'>
      <div id='button_container' class='center padding-top padding-bottom'>
        <button type='button' id='text' onclick='get_next_image(1)'><</button>
        <button type='button' id='text' onclick='get_next_image(-1)'>></button>
      </div>
      <div id='inner_container'>
        <body onload="get_next_image(0)">
        <img id='next_image' alt='image'/>
      </div>
    </div>
  </body>
